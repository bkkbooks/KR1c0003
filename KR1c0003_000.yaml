  text: 欽定四庫全書經部三
  hash: sha256:cb15cdc798f7ad6d97c6a06d82684919eb432f17fa36f28d4b42e53a43363542
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0003_WYG_000-1a, image: WYG0069/WYG0069-0001a.png}
body:
  text: 詩序詩類提要臣等謹案詩序之説紛如聚訟以為大序子夏作小序子夏毛公合作者鄭元詩譜也以為子夏所序詩即今毛詩者王肅家語注也以為衛宏受學謝曼卿作詩序者後漢書儒林傳也以為子夏所創毛公及衛宏又加潤益者隋書經籍志也以為子夏不序詩者韓愈也以為子夏惟裁初句以下出於毛公者成伯瑜也以為詩人所自製者王安石也以小序為國史之舊文以大序為孔子作者明道程子也以首句即為孔子所題者王得臣也以為毛傳初行尚未有序其後門人互相傳授各記其師説者曹粹中也以為村野妄人所作昌言排擊而不顧者則倡之者鄭樵王質和之者朱子也然樵所作詩辨妄一出周孚即作非鄭樵詩辨妄一卷摘其四十二事攻之質所作詩總聞亦不甚行於世朱子同時如吕祖謙陳傅良葉適皆以同志之交各持異議黃震篤信朱學而所作日鈔亦申序説馬端臨作經籍考於他書無所考辨惟詩序一事反覆攻詰至數千言自元明以至今日越數百年儒者尚各分左右袒也豈非説經之家第一爭詬之端乎考鄭元之釋南陔曰子夏序詩篇義合編遭戰國至秦而南陔六詩亡毛公作傳各引其序冠之篇首故詩雖亡而義猶在也程大昌考古編亦曰今六序兩語之下明言有義無詞知其為秦火之後見序而不見詩者所為也朱鶴齡毛詩通義序文舉宛邱篇序首句與毛傳異詞其説皆足為小序首句原在毛前之明證邱光庭兼明書舉鄭風出其東門篇謂毛傳與序不符曹粹中放齋詩説亦舉召南羔羊曹風鳲鳩衛風君子偕老三篇謂傳意序意不相應序若出於毛安得自相違戾其説尤足為續申之語出於毛後之明證觀蔡雍本治魯詩而所作獨斷載周頌三十一篇之序皆祇有首二句與毛序文有詳略而大旨略同蓋子夏五傳至孫卿孫卿授毛亨毛亨授毛萇是毛詩距孫卿再傳申培師浮邱伯浮邱伯師孫卿是魯詩距孫卿亦再傳故二家之序大同小異其為孫卿以來遞相授受者可知其所授受祇首二句而以下出於各家之演説亦可知也且唐書藝文志稱韓詩卜商序韓嬰注二十二卷是韓詩亦有序其序亦稱出子夏矣而韓詩遺説之傳於今者往往與毛迥異豈非傳其學者遞有增改之故哉今參考諸説定序首兩語為毛萇以前經師所傳以下續申之詞為毛萇以後弟子所附仍録冠詩部之首明淵源之有自併録朱子之辨説著門户所由分蓋數百年朋黨之爭兹其發端矣隋志有顧歡毛詩集解敘義一卷雷次宗毛詩序義二卷劉炫毛詩集小序一卷劉巘毛詩序義疏一卷案序敘二字互見蓋史之駁文今仍其舊唐志則作卜商詩序二卷今以朱子所辨其文較繁仍析為二卷若其得失則諸家之論詳矣各具本書兹不復贅焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
