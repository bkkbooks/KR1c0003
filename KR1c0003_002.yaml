body:
  text: 詩序卷下宋朱子辨說小雅鹿鳴燕羣臣嘉賓也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣序得詩意但未盡其用耳其說己見本篇四牡勞使臣之來也有功而見知則說矣首句同上然其下云云者語疏而義鄙矣皇皇者華君遣使臣也送之以禮樂言逺而有光華也首句同上然詩所謂華者草木之華非光華也常棣燕兄弟也閔管蔡之失道故作常棣焉序得之但與魚麗之序相矛盾以詩意考之蓋此得而彼失也國語富辰之言以為周文公之詩亦其明驗但春秋傳為富辰之言又以為召穆公思周德之不類故糾合宗族于成周而作此詩二書之言皆出富辰且其時去召穆公又未逺不知其說何故如此杜預以作詩為作樂而奏此詩恐亦非是伐木燕朋友故舊也自天子至於庶人未有不須友以成者親親以睦友賢不棄不遺故舊則民德歸厚矣天保下報上也君能下去聲下如字以成其政臣能歸美以報其上焉序之得失與鹿鳴相似采薇遣戍役也文王之時西有昆夷之患北有玁狁之難以天子之命命將帥遣戍役以守衛中國故歌采薇以遣之出車以勞還杕杜以勤歸也此未必文王之詩以天子之命者衍說也出車勞還率也同上詩所謂天子所謂王命皆周王耳杕杜勞還役也同上魚麗美萬物盛多能備禮也文武以天保以上治內采薇以下治外始於憂勤終於逸樂故美萬物盛多可以告於神明矣此篇以下時世次第序說之失己見本篇其內外始終之說蓋一節之可取云南陔孝子相戒以養也此笙詩也譜序篇次名義及其所用己見本篇白華孝子之潔白也同上此序尤無理華黍時和歲豐宜黍稷也有其義而亡其辭同上然所謂有其義者非真有所謂亡其辭者乃本無也南有嘉魚樂與賢也太平之君子至誠樂與賢者共之也序得詩意而不明其用其曰太平之君子者本無謂而說者又以專指成王皆失之矣南山有臺樂得賢也得賢則能為邦家立太平之基矣序首句誤詳見本篇由庚萬物得由其道也見南陔崇丘萬物得極其髙大也見上由儀萬物之生各得其宜也有其義而亡其辭見上蓼蕭澤及四海也序不知此為燕諸侯之詩但見零露之云即以為澤及四海其失與野有蔓草同臆說淺妄類如此云湛露天子燕諸侯也彤弓天子錫有功諸侯也菁菁者莪樂育材也君子能長育人材則天下喜樂之矣此序全失詩意六月宣王北伐也此句得之鹿鳴廢則和樂缺矣四牡廢則君臣缺矣皇皇者華廢則忠信缺矣常棣廢則兄弟缺矣伐木廢則朋友缺矣天保廢則福祿缺矣采薇廢則征伐缺矣出車廢則功力缺矣枤杜廢則師衆缺矣魚麗廢則法度缺矣南陔廢則孝友缺矣白華廢則亷恥缺矣華黍廢則蓄積缺矣由庚廢則隂陽失其道理矣南有嘉魚廢則賢者不安下不得其所矣崇丘廢則萬物不遂矣南山有臺廢則為國之基隊矣由儀廢則萬物失其道理矣蓼蕭廢則恩澤乖矣湛露廢則萬國離矣彤弓廢則諸夏衰矣菁菁者莪廢則無禮儀矣小雅盡廢則四夷交侵中國微矣魚麗以下篇次為毛公所移而此序自南陔以下八篇尚仍儀禮次第獨以鄭譜誤分魚麗為文武時詩故遂移此序魚麗一句自華黍之下而升於南陔之上此一節與小序同出一手其得失無足議者但欲證毛公所移篇次之失與鄭氏獨移魚麗一句之私故論於此云采芑宣王南征也車攻宣王復古也宣王能內修政事外攘夷狄復文武之竟土修車馬備器械復會諸侯於東都因田獵而選車徒焉吉日美宣王田也能慎微接下無不自盡以奉其上焉序慎微以下非詩本意鴻雁美宣王也萬民離散不安其居而能勞來還定安集之至于矜寡無不得其所焉此以下時世多不可考庭燎美宣王也因以針之沔水規宣王也鶴鳴誨宣王也祈父刺宣王也白駒大夫刺宣王也黃鳥刺宣王也我行其野刺宣王也斯干宣王考室也無羊宣王考牧也節南山家父刺幽王也家父見本篇正月大夫刺幽王也十月之交大夫刺幽王也雨無正大夫刺幽王也雨自上下者也衆多如雨而非所以為政也此序尤無義理歐陽公劉氏說己見本篇小旻大夫刺幽王也小宛大夫刺幽王也此詩不為刺王而作但兄弟遭亂畏禍而相戒之辭爾小辨刺幽王也太子之傅作焉此詩明白為放子之作無疑但未有以見其必為宜臼耳序又以為宜臼之傅尤不知其所据也巧言刺幽王也大夫傷於讒故作是詩也何人斯蘇公刺暴公也㬥公為卿士而譖蘇公焉故蘇公作是詩以絶之鄭氏曰㬥蘇皆畿內國名世本云㬥辛公作塤蘇成公作篪譙周古史考云古有塤篪尚矣周幽王時二公特善其事耳今按書有司冦蘇公春秋傳有蘇忿生戰國及漢時有人姓㬥則固應有此二人矣但此詩中只有㬥字而無公字及蘇公字不知序何所據而得此事也世本說尤紕繆譙周又從而傳會之不知適所以章其繆耳巷伯刺幽王也寺人傷於讒故作是詩也谷風刺幽王也天下俗薄朋友道絶焉蓼莪刺幽王也民人勞苦孝子不得終養爾大東刺亂也東國困於役而傷於財談大夫作是詩以告病焉談大夫未有考不知何据恐或有傳耳四月大夫刺幽王也在位貪殘下國構禍怨亂並興焉北山大夫刺幽王也役使不均已勞於從事而不得養其父母焉無將大車大夫悔將小人也此序之誤由不識興體而誤以為比也小明大夫悔仕於亂世也鼓鐘刺幽王也此詩文不明故序不敢質其事但隨例為刺幽王耳實皆未可知也楚茨刺幽王也政煩賦重田萊多荒饑饉降喪民卒流亡祭祀不饗故君子思古焉自此篇至車牽凡十篇似出一手詞氣和平稱述詳雅無風刺之意序以其在變雅中故皆以為傷今思古之作詩固有如此者然不應十篇相屬而絶無一言以見其為衰世之意也竊恐正雅之篇有錯脫在此者耳序皆失之信南山刺幽王也不能修成王之業疆理天下以奉禹功故君子思古焉曾孫古者事神之稱序專以為成王則陋矣甫田刺幽王也君子傷今而思古焉此序專以自古有年一句生說而不察其下文今適南畝以下亦未嘗不有年也大田刺幽王也言矜寡不能自存焉此序專以寡婦之利一句生說瞻彼洛矣刺幽王也思古明王能爵命諸侯賞善罰惡焉此序以命服為賞善六師為罰惡然非詩之本意也裳裳者華刺幽王也古之仕者世祿小人在位則讒諂並進棄賢者之類絶功臣之世焉此序只用似之二字生說桑扈刺幽王也君臣上下動無禮文焉此序只用彼交匪敖一句生說鴛鴦刺幽王也思古明王交於萬物有道自奉養有節焉此序穿鑿尤為無理頍辨諸公刺幽王也㬥戾無親不能宴樂同姓親睦九族孤危將亡故作是詩也序見詩言死喪無日便謂孤危將亡不知古人勸人燕樂多為此言如逝者其耋他人是保之類且漢魏以來樂府猶多如此如少壯幾時人生幾何之類是也車牽大夫刺幽王也褒姒嫉妒無道並進讒巧敗國德澤不加於民周人思得賢女以配君子故作是詩也以上十篇並己見楚茨篇青蠅大夫刺幽王也賓之初筵衛武公刺時也幽王荒廢媟近小人飲酒無度天下化之君臣上下沈湎淫泆武公既入而作是詩也韓詩說見本篇此序誤矣魚藻刺幽王也言萬物失其性王居鎬京將不能以自樂故君子思古之武王焉此詩意與楚茨等篇相類采菽刺幽王也侮慢諸侯諸侯來朝不能錫命以禮數徵會之而無信義君子見微而思古焉同上角弓父兄刺幽王也不親九族而好讒佞骨肉相怨故作是詩也菀栁刺幽王也暴虐無親而刑罰不中諸侯皆不欲朝言王者之不可朝事也都人士周人刺衣服無常也古者長民衣服不二從容有常以齊其民則民德歸一傷今不復見古人也此序蓋用緇衣之誤采緑刺怨曠也幽王之時多怨曠者也此詩怨曠者所自作非人刺之亦非怨曠者有所刺於上也黍苗刺幽王也不能膏潤天下卿士不能行召伯之職焉此宣王時美召穆公之詩非刺幽王也隰桑刺幽王也小人在位君子在野思見君子盡心以事之此亦非刺詩疑與上篇皆脫簡在此也白華周人刺幽后也幽王取申女以為后又得褒姒而黜申后故下國化之以妾為妻以孽代宗而王弗能治周人為之作是詩也此事有據序蓋得之但幽后字誤當為申后刺幽王也下國化之以下皆衍說耳又漢書注引此序幽字下有王廢申三字雖非詩意然亦可補序文之缺綿蠻微臣刺亂也大臣不用仁心遺忘微賤不肯飲食教載之故作是詩也此詩未有刺大臣之意蓋方道其心之所欲耳若如序者之言則褊狹之甚無復溫柔敦厚之意瓠葉大夫刺幽王也上棄禮而不能行雖有牲牢􅛰餼不肯用也故思古之人不以微薄廢禮焉序說非是漸漸之石下國刺幽王也戎狄叛之荆舒不至乃命將率東征役久病於外故作是詩也序得詩意但不知果為何時耳苕之華大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以饑饉君子閔周室之將亡傷已逢之故作是詩也何草不黃下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸君子憂之故作是詩也大雅文王文王受命作周也受命受天命也作周造周室也文王之德上當天心下為天下所歸往三分天下而有其二則已受命而作周矣武王繼之遂有天下亦率文王之功而已然漢儒惑於䜟緯始有赤雀丹書之說又謂文王因此遂稱王而改元殊不知所謂天之所以為天者理而已矣理之所在衆人之心而已矣衆人之心是非向背若出於一而無一毫私意雜於其間則是理之自然而天之所以為天者不外是矣今天下之心既以文王為歸矣則天命將安往哉書所謂天視自我民視天聽自我民聽所謂天聰明自我民聰明天明畏自我民明威皆謂此耳豈必赤雀丹書而稱王改元哉稱王改元之說歐陽公蘇氏游氏辨之已詳去此而論則此序本亦得詩之大㫖而於其曲折之意有所未盡已論於本篇矣大明文王有明德故天復命武王也此詩言王季大任文王大姒武王皆有明德而天命之非必如序說也綿文王之興本由大王也棫朴文王能官人也序誤旱麓受祖也周之先祖世修后稷公劉之業大王王季申以百福干祿焉序大誤其曰百福干祿者尤不成文理思齊文王所以聖也皇矣美周也天監代殷莫若周周世世修德莫若文王靈臺民始附也文王受命而民樂其有靈德以及鳥獸昆蟲焉文王作靈臺之時民之歸周也久矣非至此而始附也其曰有靈德者亦非命名之本意下武繼文也武王有聖德復受天命能昭先人之功焉下字恐誤說見本篇文王有聲繼伐也武王能廣文王之聲卒其伐功也鄭譜之誤說見本篇生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天焉行葦忠厚也周家忠厚仁及草木故能內睦九族外尊事黃耉養老乞言以成其福祿焉此詩章句本甚分明但以說者不知比興之體音韻之節遂不復得全詩之本意而碎讀之逐句自生意義不暇尋繹血脈照管前後但見勿踐行葦便謂仁及草木但見戚戚兄弟便謂親睦九族但見黃耉台背便謂養老但見以祈黃耉便謂乞言但見介爾景福便謂成其福祿隨文生義無復倫理諸序之中此失尤甚覽者詳之既醉太平也醉酒飽德人有士君子之行焉序之失如上篇蓋亦為孟子斷章所誤爾鳧鷖守成也太平之君子能持盈守成神祇祖考安樂之也同上假樂嘉成王也假本嘉字然非為嘉成王也公劉召康公戒成王也成王將涖政戒以民事美公劉之厚於民而獻是詩也召康公名奭成王即位年幼周公攝政七年而歸政焉於是成王始將涖政而召公為太保周公為太師以相之然此詩未有以見其為康公之作意其傳授或有自來耳後篇召穆公凡伯仍叔放此泂酌召康公戒成王也言皇天親有德饗有道也序無大失然語意亦疏卷阿召康公戒成王也言求賢用吉士也求賢用吉士本用詩文而言固為不切然亦未必分為兩事後之說者既誤認豈弟君子為賢人遂分賢人吉士為兩等彌失之矣夫泂酌之豈弟君子方為成王而此詩遽為所求之賢人何哉民勞召穆公刺厲王也板凡伯刺厲王也蕩召穆公傷周室大壞也厲王無道天下蕩蕩無綱紀文章故作是詩也蘇氏曰蕩之名篇以首句有蕩蕩上帝耳序說云云非詩之本意也抑衛武公刺厲王亦以自警也此詩之序有得有失蓋其本例以為非美非刺則詩無所為而作又見此詩之次適出於宣王之前故直以為刺厲王之詩又以國語有左史之言故又以為亦以自警以詩考之則其曰刺厲王者失之而曰自警者得之也夫曰刺厲王之所以為失者史記衛武公即位于宣王之三十六年不與厲王同時一也詩以小子目其君而爾汝之無人臣之禮與其所謂敬威儀慎出話者自相背戾二也厲王無道貪虐為甚詩不以此針其膏肓而徒以威儀詞令為諄切之戒緩急失宜三也詩詞倨慢雖仁厚之君有所不能容者厲王之暴何以堪之四也或以史記之年不合而以為追刺者則詩所為聽用我謀庶無大悔非所以望于既往之人五也曰自警之所以為得者國語左史之言一也詩曰謹爾侯度二也又曰曰喪厥國三也又曰亦聿既耄四也詩意所指與淇奧所美賓筵所悔相表裏五也二說之得失其佐驗明白如此必去其失而取其得然後此詩之義明今序者乃欲合而一之則其失者固已失之而其得者亦未足為全得也然此猶自其詩之外而言之也若但即其詩之本文而各以其一說反復讀之則其訓義之顯晦疏密意味之厚薄淺深可以不待考證而判然於胸中矣此又讀詩之簡要直訣學者不可以不知也桑柔芮伯刺厲王也序與春秋傳合雲漢仍叔美宣王也宣王承厲王之烈內有撥亂之志遇烖而懼側身修行欲銷去之天下喜於王化復行百姓見憂故作是詩也此序有理嵩髙尹吉甫美宣王也天下復平能建國親諸侯褒賞申伯焉此尹吉甫送申伯之詩因可以見宣王中興之業耳非專為美宣王而作也下三篇放此蒸民尹吉甫美宣王也任賢使能周室中興焉同上韓奕尹吉甫美宣王也能錫命諸侯同上其曰尹吉甫者未有據下二篇同其曰能錫命諸侯則尤淺陋無理矣既為天子錫命諸侯乃其常事春秋戰國之時猶有能行之者亦何足為美哉江漢尹吉甫美宣王也能興衰撥亂命召公平淮夷吉甫見上他說得之常武召穆公美宣王也有常德以立武事因以為戒然召穆公見上所解名篇之意未知其果然否然於理亦通瞻卬凡伯刺幽王大壞也凡伯見上召旻凡伯刺幽王大壞也旻閔也閔天下無如召公之臣也凡伯見上旻閔以下不成文理周頌清廟祀文王也周公既成洛邑朝諸侯率以祀文王焉維天之命太平告文王也詩中未見告太平之意維清奏象舞也詩中未見奏象舞之意烈文成王即政諸侯助祭也詩中未見即政之意天作祀先王先公也昊天有成命郊祀天地也此詩詳考經文而以國語證之其為康王以後祀成王之詩無疑而毛鄭舊說定以頌為成王之時周公所作故凡頌中有成王及成康字者例皆曲為之說以附己意其迂滯僻澀不成文理甚不難見而古今諸儒無有覺其謬者獨歐陽公著時世論以斥之其辨明矣然讀者狃於舊聞亦未遽肯深信也小序又以此詩篇首有昊天二字遂定以為郊祀天地之詩諸儒往往亦襲其誤殊不知其首言天命者止於一句次言文武受之者亦止一句至於成王以下然後詳說不敢康寧緝熙安靜之意乃至五句而後已則其不為祀天地而為祀成王無可疑者又況古昔聖王制為祭祀之禮必以象類故祀天於南祭地於北而其壇壝樂舞器幣之屬亦各不同若曰合祭天地於圜丘則古者未嘗有此瀆亂厖雜之禮若曰一詩而兩用如所謂冬薦魚春獻鮪者則此詩專言天而不及地若於澤中方丘奏之則於義何所取乎序說之云反覆推之皆有不通其謬無可疑者故今特上據國語旁采歐陽以定其說庶幾有以不失此詩之本指耳或曰國語所謂始於德讓中於信寬終於固和音和故曰成者其語成字不為王誦之諡而韋昭之注大略亦如毛鄭之說矣此又何耶曰叔向蓋言成王之所以為成以是三者正猶子思所謂文王之所以為文班固所謂尊號曰昭不亦宜乎者耳韋昭何以知其必謂文武以是成其王道而不為王誦之諡乎蓋其為說本出毛鄭而不悟其非者今欲一滌千古之謬而不免於以誤而證誤則亦將何時而已耶或者又曰蘇氏最為不信小序而於此詩無異詞且又以為周公制作所定後王不容復有改易成王非創業之主不應得以基命稱之此又何耶曰蘇氏之不信小序固未嘗見其不可信之實也愚於漢廣之篇已嘗論之不足援以為据也夫周公制作亦及其當時之事而止耳若乃後王之廟所奏之樂自當隨時附益若商之𤣥鳥作於武丁孫子之世漢之廟樂亦隨時而更定焉豈有周之後王乃獨不得褒顯其先王之功德而必以改周公為嫌耶基者非必造之於始亦承之於下之謂也如曰邦家之基豈必謂太王王季之臣乎以是為說亦不得而通矣況其所以為此實未能忘北郊集議之餘忿今固不得而取也我將祀文王於明堂也時邁巡守祭告柴望也執競祀武王也此詩并及成康則序說誤矣其說已具於昊天有成命之篇蘇氏以周之奄有四方不自成康之時因從小序之說此亦以辭害意之失皇矣之詩於王季章中蓋已有此語矣又豈可以其大蚤而别為之說耶詩人之言或先或後要不失為周有天下之意耳思文后稷配天也臣工諸侯助祭遣於廟也序誤噫嘻春夏祈穀於上帝也序誤振鷺二王之後來助祭也豐年秋冬報也序誤有瞽始作樂而合乎祖也潛季冬薦魚春獻鮪也雍禘太祖也祭法周人禘嚳又曰天子七廟三昭三穆及太祖之廟而七周之太祖即后稷也禘嚳於后稷之廟而以后稷配之所謂禘其祖之所自出以其祖配之者也祭法又曰周祖文王而春秋家說三年喪畢致新死者之主于廟亦謂之吉禘是祖一號而二廟禘一名而二祭也今此序云禘太祖則宜為禘嚳於后稷之廟矣而其詩之詞無及於嚳稷者若以為吉禘于文王則與序已不協而詩文亦無此意恐序之誤也此詩但為武王祭文王而徹俎之詩而後通用於他廟耳載見諸侯始見乎武王廟也序以載訓始故云始見恐未必然也有客微子來見祖廟也武奏大武也閔豫小子嗣王朝於廟也訪落嗣王謀於廟也敬之羣臣進戒嗣王也小毖嗣王求助也此四篇一時之詩序但各以其意為說不能究其本末也載芟春藉田而祈社稷也良耜秋報社稷也兩篇未見其有祈報之異絲衣繹賓尸也髙子曰靈星之尸也序誤髙子尤誤酌告成大武也言能酌先祖之道以養天下也詩中無酌字未見酌先祖之道以養天下之意桓講武類禡也桓武志也賚大封於廟也賚豫音與也言所以錫豫善人也般巡守而祀四嶽河海也此三篇說見本篇魯頌駉頌僖公也僖公能遵伯禽之法儉以足用寬以愛民務農重穀牧于坰野魯人尊之於是季孫行父請命於周而史克作是頌此序事實皆無可考詩中亦未見務農重穀之意序說鑿矣有駜頌僖公君臣之有道也此但燕飲之詩未見君臣有道之意泮水頌僖公能修泮宫也此亦燕飲落成之詩不為頌其能修也閟宫頌僖公能復周公之宇也此詩言莊公之子又言新廟奕奕則為僖公修廟之詩明矣但詩所謂復周公之宇者祝其能復周公之土宇耳非謂其能修周公之屋宇也序文首句之謬如此而蘇氏信之何哉商頌那祀成湯也微子至于戴公其間禮樂廢壞有正考甫者得商頌十二篇於周之太師以那為首序以國語為文烈祖祀中宗也詳此詩未見其為祀中宗而末言湯孫則亦祭成湯之詩耳序但不欲連篇重出又以中宗商之賢君不欲遺之耳𤣥鳥祀髙宗也詩有武丁孫子之句故序得以為据雖未必然然必是髙宗以後之詩矣長發大禘也疑見本篇殷武祀髙宗也詩序卷下
