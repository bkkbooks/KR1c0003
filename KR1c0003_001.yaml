body:
  text: 詩序卷上宋朱子辨說詩序之作說者不同或以為孔子或以為子夏或以為國史皆無明文可考唯後漢書儒林𫝊以為衛宏作毛詩序今傳於世則序乃宏作明矣然鄭氏又以為諸序本自合為一編毛公始分以置諸篇之首則是毛公之前其傳已久宏特增廣而潤色之耳故近世諸儒多以序之首句為毛公所分而其下推說云云者為後人所益理或有之但今考其首句則已有不得詩人之本意而肆為妄說者矣況沿襲云云之誤哉然計其初猶必自謂出於臆度之私非經本文故且自為一編别附經後又以尚有齊魯韓氏之說並傳於世故讀者亦有以知其出於後人之手不盡信也及至毛公引以入經乃不綴篇後而超冠篇端不為注文而直作經字不為疑辭而遂為决辭其後三家之傳又絶而毛說孤行則其抵牾之迹無復可見故此序者遂若詩人先所命題而詩文反為因序以作於是讀者轉相尊信無敢擬議至於有所不通則必為之委曲遷就穿鑿而附合之寧使經之本文繚戾破碎不成文理而終不忍明以小序為出於漢儒也愚之病此久矣然猶以其所從來也逺其間容或直有傳授證驗而不可廢者故既頗采以附傳中而復并為一編以還其舊因以論其得失云大序詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟嘆之嗟嘆之不足故永歌之永歌之不足不知手之舞之足之蹈之也情發於聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困故正得失動天地感鬼神莫近乎詩先王以是經夫婦成孝敬厚人倫美教化移風俗故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風至于王道衰禮義廢政教失國異政家殊俗而變風變雅作矣國史明乎得失之迹傷人倫之變哀刑政之苛吟詠性情以風其上達於事變而懷其舊俗者也故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛德之形容以其成功告於神明者也是謂四始詩之至也小序周南關雎后妃之德也后妃文王之妃大姒也天子之妃曰后近世諸儒多辨文王未嘗稱王則大姒亦未嘗稱后序者蓋追稱之亦未害也但其詩雖若專美大姒而實以深見文王之德序者徒見其詞而不察其意遂一以后妃為主而不復知有文王是固已失之矣至於化行中國三分天下亦皆以為后妃之所致則是禮樂征伐皆出於婦人之手而文王者徒擁虛器以為寄生之君也其失甚矣唯南豐曾氏之言曰先王之政必自內始故其閨門之治所以施之家人者必為之師傅保姆之助詩書圖史之戒珩璜琚瑀之節威儀動作之度其教之者有此具然古之君子未嘗不以身化也故家人之義歸於反身二南之業本於文王豈自外至哉世皆知文王之所以興能得內助而不知其所以然者蓋本於文王之躬化故內則后妃有關雎之行外則羣臣有二南之美與之相成其推而及逺則商辛之昏俗江漢之小國兔罝之野人莫不好善而不自知此所謂身修故國家天下治者也竊謂此說庶幾得之風之始也所謂關雎之亂以為風始是也蓋謂國風篇章之始亦風化之所由始也所以風天下而正夫婦也故用之鄉人焉用之邦國焉說見二南總論邦國謂諸侯之國明非獨天子用之也風風也教也風以動之教以化之承上文解風字之義以象言則曰風以事言則曰教然則關雎麟趾之化王者之風故繫之周公南言化自北而南也鵲巢騶虞之德諸侯之風也先王之所以教故繫之召公說見二南卷首關雎麟趾言化者化之所自出也鵲巢騶虞言德者被化而成德也以其被化而後成德故又曰先王之所以教先王即文王也舊說以為大王王季誤矣程子曰周南召南如乾坤乾統坤坤承乾也周南召南正始之道王化之基王者之道始於家終於天下而二南正家之事也王者之化必至於法度彰禮樂著雅頌之聲作然後可以言成然無其始則亦何所因而立哉基者堂宇之所因而立者也程子曰有關雎麟趾之意然後可以行周官之法度其為是歟是以關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉是關雎之義也按論語孔子嘗言關雎樂而不淫哀而不傷蓋淫者樂之過傷者哀之過獨為是詩者得其性情之正是以哀樂中節而不至於過耳而序者乃析哀樂淫傷各為一事而不相須則已失其㫖矣至以傷為傷善之心則又大失其㫖而全無文理也或曰先儒多以周道衰詩人本諸袵席而關雎作故揚雄以周康之時關雎作為傷始亂杜欽亦曰佩玉晏鳴關雎歎之說者以為古者后夫人雞鳴佩玉去君所周康后不然故詩人歎而傷之此魯詩說也與毛異矣但以哀而不傷之意推之恐其有此理也曰此不可知矣但儀禮以關雎為鄉樂又為房中之樂則是周公制作之時已有此詩矣若如魯說則儀禮不得為周公之書儀禮不為周公之書則周之盛時乃無鄉射燕飲房中之樂而必有待乎後世之刺詩也其不然也明矣且為人子孫乃無故而播其先祖之失於天下如此而尚可以為風化之首乎葛覃后妃之本也后妃在父母家則志在於女功之事躬儉節用服浣濯之衣尊敬師傅則可以歸安父母化天下以婦道也此詩之序首尾皆是但其所謂在父母家者一句為未安蓋若謂未嫁之時即詩中不應遽以歸寧父母為言況未嫁之時自當服勤女功不足稱述以為盛美若謂歸寧之時即詩中先言刈葛而後言歸寧亦不相合且不常為之於平居之日而暫為之於歸寧之時亦豈所謂庸行之謹哉序之淺拙大率類此卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞內有進賢之志而無險詖私謁之心朝夕思念至於憂勤也此詩之序首句得之餘皆傅會之鑿說后妃雖知臣下之勤勞而憂之然曰嗟我懷人則其言親昵非后妃之所得施於使臣者矣且首章之我獨為后妃而後章之我皆為使臣首尾衡決不相承應亦非文字之體也樛木后妃逮下也言能逮下而無嫉妬之心焉此序稍平後不注者放此螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也螽斯聚處和一而卵育蕃多故以為不妒忌則子孫衆多之比序者不達此詩之體故遂以不妒忌者歸之螽斯其亦誤矣桃夭后妃之所致也不妒忌則男女以正婚姻以時國無鰥民也序首句非是其所謂男女以正婚姻以時國無鰥民者得之蓋此以下諸詩皆言文王風化之盛由家及國之事而序者失之皆以為后妃之所致既非所以正男女之位而於此詩又專以為不妒忌之功則其意愈狹而說愈疏矣罝后妃之化也關雎之化行則莫不好德賢人衆多也此序首句非是而所謂莫不好德賢人衆多者得之芣苡后妃之美也和平則婦人樂有子矣漢廣德廣所及也文王之道被於南國美化行乎江漢之域無思犯禮求而不可得也此詩以篇內有漢之廣矣一句得名而序者謬誤乃以德廣所及為言失之逺矣然其下文復得詩意而所謂文王之化者尤可以正前篇之誤先儒嘗謂序非出於一人之手者此其一驗但首句未必是下文未必非耳蘇氏乃例取首句而去其下文則於此類兩失之矣汝墳道化行也文王之化行乎汝墳之國婦人能閔其君子猶勉之以正也麟之趾關雎之應也關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也之時二字可刪召南鵲巢夫人之德也國君積行纍功以致爵位夫人起家而居有之德如鳴鳩乃可以配焉文王之時關雎之化行於閨門之內而諸侯蒙化以成德者其道亦始於家人故其夫人之德如是而詩人美之也不言所美之人者世逺而不可知也後皆放此采蘩夫人不失職也夫人可以奉祭祀則不失職矣草蟲大夫妻能以禮自防也此恐亦是夫人之詩而未見以禮自防之意采蘋大夫妻能循法度也能循法度則可以承先祖共祭祀矣甘棠美召伯也召伯之教明於南國行露召伯聽訟也衰亂之俗微貞信之教興强暴之男不能侵陵貞女也羔羊鵲巢之功致也召南之國化文王之政在位皆節儉正直德如羔羊也此序得之但德如羔羊一句為衍說耳殷其靁勸以義也召南之大夫逺行從政不遑寧處其室家能閔其勤勞勸以義也按此詩無勸以義之意摽有梅男女及時也召南之國被文王之化男女得以及時也此序末句未安小星惠及下也夫人無妒忌之行惠及賤妾進䘖於君知其命有貴賤能盡其心矣江有汜美媵也勤而無怨嫡能悔過也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也詩中未見勤勞無怨之意野有死麕惡無禮也天下大亂强暴相陵遂成淫風被文王之化雖當亂世猶惡無禮也此序得之但所謂無禮者言淫亂之非禮耳不謂無聘幣之禮也何彼穠矣美王姬也雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德也此詩時世不可知其說己見本篇但序云雖則王姬亦下嫁於諸侯說者多笑其陋然此但讀為兩句之失耳若讀此十字合為一句而對下文車服不繫其夫下王后一等為義則序者之意亦自明白蓋曰王姬雖嫁於諸侯然其車服制度與他國之夫人不同所以甚言其貴盛之極而猶不敢挾貴以驕其夫家也但立文不善終費詞說耳鄭氏曰下王后一等謂車乘厭音葉翟音狄勒面繢音繪總服則褕音遙翟然則公侯夫人翟茀者其翟車貝面組總有幄也歟騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖搜田以時仁如騶虞則王道成也此序得詩之大㫖然語意亦不分明楊氏曰二南正始之道王化之基蓋一體也王者諸侯之風相須以為治諸侯所以代其終也故召南之終至於仁如騶虞然後王道成焉夫王道成非諸侯之事也然非諸侯有騶虞之德亦何以見王道之成哉歐陽公曰賈誼新書曰騶者文王之囿名虞者囿之司獸也陳氏曰禮記射義云天子以騶虞為節樂官備也則其為虞官明矣獵以虞為主其實歎文王之仁而不斥言也此與舊說不同今存於此邶柏舟言仁而不遇也衛頃公之時仁人不遇小人在側詩之文意事類可以思而得其時世名氏則不可以强而推故凡小序唯詩文明白直指其事如甘棠定中南山株林之屬若證驗的切見於書史如載馳碩人清人黃鳥之類決為可無疑者其次則詞㫖大槩可知必為某事而不可知其的為某時某人者尚多有之若為小序者姑以其意推尋探索依約而言則雖有所不知亦不害其為不自欺雖有未當人亦當恕其所不及今乃不然不知其時者必强以為某王某公之時不知其人者必强以為某甲某乙之事於是傅會書史依託名諡鑿空妄語以誑後人其所以然者特以恥其有所不知而唯恐人之不見信而已且如柏舟不知其出於婦人而以為男子不知其不得於夫而以為不遇於君此則失矣然有所不及而不自欺則亦未至於大害理也今乃斷然以為衛頃公之時則其故為欺罔以誤後人之罪不可掩矣蓋其偶見此詩冠於三衛變風之首是以求之春秋之前而史記所書莊桓以上衛之諸君事皆無可考者諡亦無甚惡者獨頃公有賂王請命之事其諡又為甄心動懼之名如漢諸侯王必其嘗以罪謫然後加以此諡以是意其必有棄賢用佞之失而遂以此詩豫音與之若將以衒其多知而必於取信不知將有明者從旁觀之則適所以暴其真不知而啓其深不信也凡小序之失以此推之什得八九矣又其為說必使詩無一篇不為美刺時君國政而作固己不切於情性之自然而又拘於時世之先後其或詩𫝊所載當此之時偶無賢君美諡則雖有詞之美者亦例以為陳古而刺今是使讀者疑於當時之人絶無善則稱君過則稱已之意而一不得志則扼腕切齒嘻笑冷語以懟其上者所在而成羣是其輕躁險薄尤有害於溫柔敦厚之教故豫不可以不辨緑衣衛莊姜傷己也妾上僭夫人失位而作是詩也此詩下至終風四篇序皆以為莊姜之詩今姑從之然唯燕燕一篇詩文略可據耳燕燕衛莊姜送歸妾也逺送于南一句可為送戴媯之驗日月衛莊姜傷己也遭州吁之難傷己不見答於先君以至困窮之詩也此詩序以為莊姜之作今未有以見其不然但謂遭州吁之難而作則未然耳蓋詩言寧不我顧猶有望之之意又云德音無良亦非所宜施於前人者明是莊公在時所作其篇次亦當在燕燕之前也終風衛莊姜傷己也遭州吁之暴見侮慢而不能正也詳味此詩有夫婦之情無母子之意若果莊姜之詩則亦當在莊公之世而列於燕燕之前序說誤矣擊鼓怨州吁也衛州吁用兵暴亂使公孫文仲將而平陳與宋國人怨其勇而無禮也春秋隱公四年宋衛陳蔡伐鄭正州吁自立之時也序蓋據詩文平陳與宋而引此為說恐或然也然𫝊記魯衆仲之言曰州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也夫州吁弒其君而虐用其民於是乎不務令德而欲以亂成必不免矣按州吁篡弒之賊此序但譏其勇而無禮固為淺陋而衆仲之言亦止於此蓋君臣之義不明於天下久矣春秋其得不作乎凱風美孝子也衛之淫風流行雖有七子之母猶不能安其室故美七子能盡其孝道以慰其母心而成其志爾以孟子之說證之序說亦是但此乃七子自責之辭非美七子之作也雄雉刺衛宣公也淫亂不恤國事軍旅數起大夫久役男女怨曠國人怨之而作是詩序所謂大夫久役男女怨曠者得之但未有以見其為宣公之時與淫亂不恤國事之意耳兼此詩亦婦人作非國人之所為也匏有苦葉刺衛宣公也公與夫人並為淫亂未有以見其為刺宣公夫人之詩谷風刺夫婦失道也衛人化其上淫於新昏而棄其舊室夫婦離絶國俗傷敗焉亦未有以見化其上之意式微黎侯寓于衛其臣勸以歸也詩中無黎侯字未詳是否下篇同旄丘責衛伯也狄人迫逐黎侯黎侯寓于衛衛不能修方伯連率音帥之職黎之臣子以責於衛也序見詩有伯兮二字而以為責衛伯之詞誤矣陳氏曰說者以此為宣公之詩然宣公之後百餘年衛穆公之時晉滅赤狄潞氏數之以其奪黎氏地然則此其穆公之詩乎不可得而知也簡兮刺不用賢也衛之賢者仕於伶官皆可以承事王者也此序略得詩意而詞不足以達之泉水衛女思歸也嫁於諸侯父母終思歸寧而不得故作是詩以自見也北門刺仕不得志也言衛之忠臣不得其志爾北風刺虐也衛國並為威虐百姓不親莫不相攜持而去焉衛以淫亂亡國未聞其有威虐之政如序所云者此恐非是靜女刺時也衛君無道夫人無德此序全然不似詩意新臺刺衛宣公也納伋之妻作新臺於河上而要之國人惡之而作是詩也二子乘舟思伋壽也衛宣公之二子爭相為死國人傷而思之作是詩也二詩說已各見本篇鄘柏舟共姜自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之此事無所見於他書序者或有所𫝊今姑從之牆有茨衛人刺其上也公子頑通乎君母國人疾之而不可道也君子偕老刺衛夫人也夫人淫亂失事君子之道故陳人君之德服飾之盛宜與君子偕老也公子頑事見春秋傳但此詩所以作亦未可考鶉之奔奔放此桑中刺奔也衛之公室淫亂男女相奔至于世族在位相竊妻妾期于幽逺政散民流而不可止此詩乃淫奔者所自作序之首句以為刺奔誤矣其下云云者乃復得之樂記之說已略見本篇矣而或者以為刺詩之體固有鋪陳其事不加一辭而閔惜懲創之意自見於言外者此類是也豈必譙讓質責然後為刺也哉此說不然夫詩之為刺固有不加一辭而意自見者清人猗嗟之屬是已然嘗試玩之則其賦之之人猶在所賦之外而詞意之間猶有賓主之分也豈有將欲刺人之惡乃反自為彼人之言以陷其身於所刺之中而不自知也哉其必不然也明矣又況此等之人安於為惡其於此等之詩計其平日固己自其口出而無慚矣又何待吾之鋪陳而後始知其所為之如此亦豈畏我之閔惜而遂幡然遽有懲創之心耶以是為刺不惟無益殆恐不免於鼓之舞之而反以勸其惡也或者又曰詩三百篇皆雅樂也祭祀朝聘之所用也桑間濮上之音鄭衛之樂也世俗之所用也雅鄭不同部其來尚矣且夫子答顔淵之問於鄭聲亟欲放而絶之豈其刪詩乃録淫奔者之詞而使之合奏於雅樂之中乎亦不然也雅者二雅是也鄭者緇衣以下二十一篇是也衛者邶鄘衛三十九篇是也桑間衛之一篇桑中之詩是也二南雅頌祭祀朝聘之所用也鄭衛桑濮里巷俠邪之所歌也夫子之於鄭衛蓋深絶其聲於樂以為法而嚴立其詞於詩以為戒如聖人固不語亂而春秋所記無非亂臣賊子之事蓋不如是無以見當時風俗事變之實而垂鑒戒於後世故不得已而存之所謂道並行而不相悖者也今不察此乃欲為之諱其鄭衛桑濮之實而文之以雅樂之名又欲從而奏之宗廟之中朝廷之上則未知其將以薦之何等之鬼神用之何等之賓客而於聖人為邦之法又豈不為陽守而隂叛之耶其亦誤矣曰然則大序所謂止乎禮義夫子所謂思無邪者又何謂邪曰大序指柏舟緑衣泉水竹竿之屬而言以為多出於此耳非謂篇篇皆然而桑中之類亦止乎禮義也夫子之言正為其有邪正美惡之雜故特言此以明其皆可以懲惡勸善而使人得其性情之正耳非以桑中之類亦以無邪之思作之也曰荀卿所謂詩者中聲之所止太史公亦謂三百篇者夫子皆絃歌之以求合於韶武之音何邪曰荀卿之言固為正經而發若史遷之說則恐亦未足為據也豈有哇淫之曲而可以强合於韶武之音也邪鶉之奔奔刺衛宣姜也衛人以為宣姜鶉鵲之不若也見上定之方中美衛文公也衛為狄所滅東徙渡河野處漕邑齊桓公攘戎狄而封之文公徙居楚丘始建城市而營宫室得其時制百姓說之國家殷富焉蝃蝀止奔也衛文公能以道化其民淫奔之恥國人不齒也相鼠刺無禮也衛文公能正其羣臣而刺在位承先君之化無禮儀也干旄美好善也衛文公臣子多好善賢者樂告以善道也定之方中一篇經文明白故序得以不誤蝃蝀以下亦因其在此而以為文公之詩耳他未有考也載馳許穆夫人作也閔其宗國顛覆自傷不能救也衛懿公為狄人所滅國人分散露於漕邑許穆夫人閔衛之亡傷許之小力不能救思歸唁其兄又義不得故賦是詩也此亦經明白而序不誤者又有春秋傳可證衛淇澳美武公之德也有文章又能聽其規諫以禮自防故能入相于周美而作是詩也此序疑得之考槃刺莊公也不能繼先公之業使賢者退而窮處此為美賢者窮處而能安其樂之詩文意甚明然詩文未有見棄於君之意則亦不得為刺莊公矣序蓋失之而未有害於義也至於鄭氏遂有誓不忘君之惡誓不過君之朝誓不告君以善之說則其害義又有甚焉於是程子易其訓詁以為陳其不能忘君之意陳其不得過君之朝陳其不得告君以善則其意忠厚而和平矣然未知鄭氏之失生於序文之誤若但直據詩詞則與其君初不相涉也碩人閔莊姜也莊公惑於嬖妾使驕上僭莊姜賢而不答終以無子國人閔而憂之此序據春秋傳得之氓刺時也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相棄背或乃困而自悔喪其妃耦故序其事以風焉美反正刺淫泆也此非刺時宣公未有考故序其事以下亦非是其曰美反正者尤無理竹竿衛女思歸也適異國而不見答思而能以禮者也未見不見答之意芄蘭刺惠公也驕而無禮大夫刺之此詩不可考當闕河廣宋襄公母歸於衛思而不止故作是詩也伯兮刺時也言君子行役為王前驅過時而不反焉舊說以詩有為王前驅之文遂以此為春秋所書從王伐鄭之事然詩又言自伯之東則鄭在衛西不得為此行矣序言為王前驅蓋用詩文然似未識其文意也有狐刺時也衛之男女失時喪其妃耦焉古者國有凶荒則殺禮而多昏會男女之無夫家者所以育人民也男女失時之句未安其曰殺禮多昏者周禮大司徒以荒政十有二聚萬民十日多昏者是也序者之意蓋曰衛於此時不能舉此之政耳然亦非詩之正意也長樂劉氏曰夫婦之禮雖不可不謹於其始然民有細微貧弱者或困於凶荒必待禮而後昏則男女之失時者多無室家之養聖人傷之寧邦典之或違而不忍失其昏嫁之時也故有荒政多昏之禮所以使之相依以為生而又以育人民也詩不云乎愷悌君子民之父母茍無子育兆庶之心其能若此哉此則周禮之意也木瓜美齊桓公也衛國有狄人之敗出處於漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之而作是詩也說見本篇王黍離閔宗周也周大夫行役至於宗周過故宗廟宫室盡為禾黍閔周室之顛覆倣徨不忍去而作是詩也君子于役刺平王也君子行役無期度大夫思其危難以風焉此國人行役而室家念之之辭序說誤矣其曰刺平王亦未有考君子陽陽閔周也君子遭亂相招為祿仕全身逺害而已說同上篇揚之水刺平王也不撫其民而逺屯戍于母家周人怨思焉中谷有蓷閔周也夫婦日以衰薄凶年飢饉室家相棄爾爰閔周也桓王失信諸侯背叛構怨連禍王師傷敗君子不樂其生焉君子不樂其生一句得之餘皆衍說其指桓王蓋據春秋傳鄭伯不朝王以諸侯伐鄭鄭伯禦之王卒大敗祝𣆀射王中肩之事然未有以見此詩之為是而作也葛藟王族刺平王也周室道衰棄其九族焉序說未有據詩意亦不類說己見本篇采葛懼讒也此淫奔之詩其篇與大車相屬其事與采唐采葑采麥相似其詞與鄭子襟正同序說誤矣大車刺周大夫也禮義陵遲男女淫奔故陳古以刺今大夫不能聽男女之訟焉非刺大夫之詩乃畏大夫之詩丘中有麻思賢也莊王不明賢人放逐國人思之而作是詩也此亦淫奔者之詞其篇上屬大車而語意不莊非望賢之意序亦誤矣鄭緇衣美武公也父子並為周司徒善於其職國人宜之故美其德以明有國善善之功焉此未有據今姑從之將仲子刺莊公也不勝其母以害其弟弟叔失道而公弗制祭仲諫而公弗聽小不忍以致大亂焉事見春秋傳然莆田鄭氏謂此實淫奔之詩無與於莊公叔段之事序蓋失之而說者又從而巧為之說以實其事誤亦甚矣今從其說叔于田刺莊公也叔處于京繕甲治兵以出于田國人說而歸之國人之心二于叔而歌其田狩適野之事初非以刺莊公亦非說其出于田而後歸之也或曰段以國君貴弟受封大邑有人民兵甲之衆不得出居閭巷下雜民伍此詩恐亦民間男女相說之詞耳大叔于田刺莊公也叔多才而好勇不義而得衆也此詩與上篇意同非刺莊公也下兩句得之清人刺文公也髙克好利而不顧其君文公惡而欲逺之不能使髙克將兵而禦敵于竟陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩也按此序蓋本春秋傳而以他說廣之未詳所据孔氏正義又据序文而以是詩為公子素之作然則進之當作之進今文誤也羔裘刺朝也言古之君子以風其朝焉序以變風不應有美故以此為言古以刺今之詩今詳詩意恐未必然且當時鄭之大夫如子皮子産之徒豈無可以當此詩者但今不可考耳遵大路思君子也莊公失道君子去之國人思望焉此亦淫亂之詩序說誤矣女曰雞鳴刺不說德也陳古義以刺今不說德而好色也此亦未有以見其陳古刺今之意有女同車刺忽也鄭人刺忽之不昏于齊太子忽嘗有功于齊齊侯請妻之齊女賢而不取卒以無大國之助至于見逐故國人刺之按春秋傳齊侯欲以文姜妻鄭太子忽忽辭人問其故忽曰人各有耦齊大非吾耦也詩曰自求多福在我而已大國何為其後北戎侵齊鄭伯使忽帥師救之敗戎師齊侯又請妻之忽曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸鄭伯祭仲謂忽曰君多內寵子無大援將不立忽又不聽及即位遂為祭仲所逐此序文所據以為說者也然以今考之此詩未必為忽而作序者但見孟姜二字遂指以為齊女而附之於忽耳假如其說則忽之辭昏未為不正而可刺至其失國則又特以勢孤援寡不能自定亦未有可刺之罪也序乃以為國人作詩以刺之其亦誤矣後之讀者又襲其誤必欲鍛鍊羅織文致其罪而不肯赦徒欲以徇說詩者之謬而不知其失是非之正害義理之公以亂聖經之本㫖而壞學者之心術故豫不可以不辨山有扶蘇刺忽也所美非美然此下四詩及揚之水皆男女戲謔之詞序之者不得其說而例以為刺忽殊無情理籜兮刺忽也君弱臣彊不倡而和也見上狡童刺忽也不能與賢人圖事權臣擅命也昭公嘗為鄭國之君而不幸失國非有大惡使其民疾之如冦讎也況方刺其不能與賢人圖事權臣擅命則是公猶在位也豈可忘其君臣之分而遽以狡童目之耶且昭公之為人柔懦疏濶不可謂狡即位之時年已壯大不可謂童以是名之殊不相似而序於山有扶蘇所謂狡童者方指昭公之所美至於此篇則遂移以指公之身焉則其舛又甚而非詩之本㫖明矣大扺序者之於鄭詩凡不得其說者則舉而歸之於忽文義一失而其害於義理有不可勝言者一則使昭公無辜而被謗二則使詩人脫其淫謔之實罪而麗於訕上悖理之虛惡三則厚誣聖人刪述之意以為實賤昭公之守正而深與詩人之無禮於其君凡此皆非小失而後之說者猶或主之其論愈精其害愈甚學者不可以不察也褰裳思見正也狂童恣行國人思大國之正已也此序之失蓋本於子大叔韓宣子之言而不察其斷章取義之意耳丰刺亂也昏姻之道缺陽倡而隂不和男行而女不隨此淫奔之詩序說誤矣東門之墠刺亂也男女有不待禮而相奔者也此序得之風雨思君子也亂世則思君子不改其度焉序意甚美然考詩之詞輕佻狎昵非思賢之意也子襟刺學校廢也亂世則學校不修焉疑同上篇蓋其詞意儇薄施之學校尤不相似也揚之水閔無臣也君子閔忽之無忠臣良士終以死亡而作是詩也此男女要結之詞序說誤矣出其東門閔亂也公子五爭兵革不息男女相棄民人思保其室家焉五爭事見春秋傳然非此之謂也此乃惡淫奔者之詞序誤野有蔓草思遇時也君之澤不下流民窮於兵革男女失時思不期而會焉東萊吕氏曰君之澤不下流乃講師見零露之語從而附益之溱洧刺亂也兵革不息男女相棄淫風大行莫之能鄭俗淫亂乃其風聲氣習流傳已久不為兵革不息男女相棄而後然也齊雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉此序得之但哀公未有所考豈亦以諡惡而得之歟還刺荒也哀公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢間於馳逐謂之好焉同上著刺時也時不親迎也東方之日刺衰也君臣失道男女淫奔不能以禮化也此男女淫奔者所自作非有刺也其曰君臣失道者尤無所謂東方未明刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉夏官挈壺氏下士六人挈縣挈之名壺盛水器蓋置壺浮箭以為晝夜之節也漏刻不明固可以見其無政然所以興居無節號令不時則未必皆挈壺氏之罪也南山刺襄公也鳥獸之行淫乎其妹大夫遇是惡作詩而去之此序據春秋經傳為文說見本篇甫田大夫刺襄公也無禮義而求大功不修德而求諸侯志大心勞所以求者非其道也未見其為襄公之詩盧令刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉義與還同序說非是敝笱刺文姜也齊人惡魯桓公微弱不能防間文姜使至淫亂為二國患焉桓當作莊載驅齊人刺襄公也無禮義故盛其車服疾驅於通道大都與文姜淫播其惡於萬民焉此亦刺文姜之詩猗嗟刺魯莊公也齊人傷魯莊公有威儀技藝然而不能以禮防間其母失子之道人以為齊侯之子焉此序得之魏葛屨刺褊也魏地狹隘其民機巧趨利其君儉嗇褊急而無德以將之汾沮洳刺儉也其君儉以能勤刺不得禮也此未必為其君而作崔靈恩集注其君作君子義雖稍通然未必序者之本意也園有桃刺時也大夫憂其君國小而迫而儉以嗇不能用其民而無德教日以侵削故作是詩也國小而迫日以侵削者得之餘非是陟岵孝子行役思念父母也國迫而數侵削役乎大國父母兄弟離散而作是詩也十畝之間刺時也言其國削小民無所居焉國削則其民隨之序文殊無理其說己見本篇矣伐檀刺貪也在位貪鄙無功而受祿君子不得進仕爾此詩專美君子之不素餐序言刺貪失其指矣碩鼠刺重斂也國人刺其君重斂𧖟食於民不修其政貪而畏人若大鼠也此亦託於碩鼠以刺其有司之詞未必直以碩鼠比其君也唐蟋蟀刺晉僖公也儉不中禮故作是詩以閔之欲其及時以禮自娛樂也此晉也而謂之唐本其風俗憂深思逺儉而用禮乃有堯之遺風焉河東地瘠民貧風俗勤儉乃其風土氣習有以使之至今猶然則在三代之時可知矣序所謂儉不中禮固當有之但所謂刺僖公者蓋特以諡得之而所謂欲其及時以禮自娛樂者又與詩意正相反耳況古今風俗之變常必由儉以入奢而其變之漸又必由上以及下今謂君之儉反過於初而民之俗猶知用禮則尤恐其無是理也獨其憂深思逺有堯之遺風者為得之然其所以不謂之晉而謂之唐者又初不為此也山有樞刺晉昭公也不能修道以正其國有財不能用有鐘鼓不能以自樂有朝廷不能灑掃政荒民散將以危亡四鄰謀取其國家而不知國人作詩以刺之也此詩蓋以答蟋蟀之意而寬其憂非臣子所得施於君父者序說大誤揚之水刺晉昭公也昭公分國以封沃沃盛彊昭公微弱國人將叛而歸沃焉詩文明白序說不誤椒聊刺晉昭公也君子見沃之盛彊能修其政知其蕃衍盛大子孫將有晉國焉此詩未見其必為沃而作也綢繆刺晉亂也國亂則昏姻不得其時焉此但為婚姻者相得而喜之詞未必為刺晉國之亂也杕杜刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所并爾此乃人無兄弟而自歎之詞未必如序之說也況曲沃實晉之同姓其服屬又未逺乎羔裘刺時也晉人刺其在位不恤其民也詩中未見此意鴇羽刺時也昭公之後大亂五世君子下從征役不得養其父母而作是詩也序意得之但其時世則未可知耳無衣美晉武公也武公始并晉國其大夫為之請命乎天子之使而作是詩也序以史記為文詳見本篇但此詩若非武公自作以述其賂王請命之意則詩人所作以著其事而隂刺之耳序乃以為美之失其㫖矣且武公弒君篡國大逆不道乃王法之所必誅而不赦者雖曰尚知王命之重而能請之以自安是亦禦人於白晝大都之中而自知其罪之甚重則分薄贓餌貪吏以求私有其重寶而免於刑戮是乃猾賊之尤耳以是為美吾恐其奬姦誨盜而非所以為教也小序之陋固多然其顛倒順逆亂倫悖理未有如此之甚者故豫特深辨之以正人心以誅賊黨意庶幾乎大序所謂正得失者而因以自附於春秋之義云有杕之杜刺晉武公也武公寡特兼其宗族而不求賢以自輔焉此序全非詩意葛生刺晉獻公也好攻戰則國人多喪矣采苓刺晉獻公也獻公好聽讒焉獻公固喜攻戰而好讒佞然未見此二詩之果作於其時也秦車鄰美秦仲也秦仲始大有車馬禮樂侍御之好焉未見其必為秦仲之詩大率秦風唯黃鳥渭陽為有据其他諸詩皆不可考駟馬美襄公也始命有田狩之事園囿之樂焉小戎美襄公也備其兵甲以討西戎西戎方彊而征伐不休國人則矜其車甲婦人能閔其君子焉此詩時世未必然而義則得之說見本篇兼葭刺襄公也未能用周禮將無以固其國焉此詩未詳所謂然序說之鑿則必不然矣終南戒襄公也能取周地始為諸侯受顯服大夫美之故作是詩以戒勸之黃鳥哀三良也國人刺穆公以人從死而作是詩也此序最為有據晨風刺康公也忘穆公之業始棄其賢臣焉此婦人念其君子之詞序說誤矣無衣刺用兵也秦人刺其君好攻戰亟用兵而不與民同欲焉序意與詩情不協說己見本篇矣渭陽康公念母也康公之母晉獻公之女文公遭麗姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思而作是詩也此序得之但我見舅氏如母存焉兩句若為康公之辭者其情哀矣然無所繫屬不成文理蓋此以下又别一手所為也及其即位而作是詩蓋亦但見首句云康公而下云時為太子故生此說其淺暗拘滯大率如此權輿刺康公也忘先君之舊臣與賢者有始而無終也陳宛丘刺幽公也淫荒昏亂游蕩無度焉陳國小無事實幽公但以諡惡故得游蕩無度之詩未敢信也東門之枌疾亂也幽公淫荒風化之所行男女棄其舊業亟會於道路歌舞於市井爾同上衡門誘僖公也願而無立志故作是詩以誘掖其君也僖者小心畏忌之名故以為願無立志而配以此詩不知其為賢者自樂而無求之意也東門之池刺時也疾其君之淫昏而思賢女以配君子也此淫奔之詩序說蓋誤東門之楊刺時也昏姻失時男女多違親迎女猶有不至者也同上墓門刺陳他也陳他無良師傅以至於不義惡加於萬民焉陳國君臣事無可紀獨陳他以亂賊被討見書於春秋故以無良之詩與之序之作大抵類此不知其信然否也防有鵲巢憂讒賊也宣公多信讒君子憂懼焉此非刺其君之詩月出刺好色也在位不好德而說美色焉此不得為刺詩株林刺靈公也淫乎夏姬驅馳而往朝夕不休息焉陳風獨此篇為有据澤陂刺時也言靈公君臣淫於其國男女相說憂思感傷焉檜羔裘大夫以道去其君也國小而迫君不用道好潔其衣服逍遙游燕而不能自强於政治故作是詩也素冠刺不能三年也隰有萇楚疾恣也國人疾其君之淫恣而思無情欲者也此序之誤說見本篇匪風思周道也國小政亂憂及禍難而思周道焉詩言周道但謂適周之路如四牡所謂周道逶遲耳序言思周道者蓋不達此意也曹蜉蝣刺奢也昭公國小而迫無法以自守好奢而任小人將無所依焉言昭公未有考候人刺近小人也共公逺君子而好近小人焉此詩但以三百赤芾合於左氏所記晉侯入曹之事序遂以為共公未知然否鳲鳩刺不一也在位無君子用心之不一也此美詩非刺詩下泉思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也曹無他事可考序因候人而遂以為共公然此乃天下之大勢非共公之罪也豳七月陳王業也周公遭變故陳后稷先公風化之所由致王業之艱難也董氏曰先儒以七月為周公居東而作考其詩則陳后稷公劉所以治其國者方風諭以成其德故是未居東也至于鴟梟則居東而作其在書可知矣鴟梟周公救亂也成王未知周公之志公乃為詩以遺王名之曰鴟梟焉此序以金縢為文最為有据東山周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也一章言其完也二章言其思也三章言其室家之望女也四章樂男女之得及時也君子之於人序其情而閔其勞所以說也說以使民民忘其死其為東山乎此周公勞歸士之詞非大夫美之而作也破斧美周公也周大夫以惡四國焉此歸士美周公之詞非大夫惡四國之詩也且詩所謂四國猶言斬伐四國耳序說以為管蔡商奄尤無理也伐柯美周公也周大夫刺朝廷之不知也九罭美周公也周大夫刺朝廷之不知也二詩東人喜周公之至而願其留之詞序說皆非狼跋美周公也周公攝政逺則四國流言近則王不知周大夫美其不失其聖也詩序卷上
